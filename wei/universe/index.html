<title>Wei's Universe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --void:#04020c;
    --starlight:#f5efff;
    --lav:#c9b6e6;
    --lav-dim:#95819e;
    --gold:#e9cf9a;
    --gold-dim:#b39a66;
    --glass:rgba(14,9,28,.78);
    --glass-soft:rgba(20,13,40,.55);
    --line:rgba(208,188,255,.20);
    --script:'Great Vibes','Snell Roundhand','Apple Chancery',cursive;
    --serif:'Cormorant Garamond','Didot','Georgia',serif;
    --caps:'Cinzel','Optima',serif;
  }
  html,body{margin:0;padding:0;background:var(--void);overflow:hidden;height:100%;
    overscroll-behavior:none;}
  #app{position:fixed;inset:0;font-family:var(--serif);font-style:italic;color:var(--starlight);
       -webkit-font-smoothing:antialiased;}
  #cosmos{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}
  #vignette{position:absolute;inset:0;pointer-events:none;z-index:2;
    background:radial-gradient(ellipse at 50% 44%, transparent 52%, rgba(2,1,8,.62) 100%);}

  /* ---------------- intro ---------------- */
  #intro{position:absolute;inset:0;z-index:30;background:#04020c;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:0;transition:opacity 1.6s ease,visibility 1.6s;cursor:pointer;}
  #intro.gone{opacity:0;pointer-events:none;visibility:hidden;}
  #intro .iline{font-family:var(--script);font-size:clamp(19px,2.6vw,28px);color:var(--lav);
    opacity:0;line-height:2;text-shadow:0 0 18px rgba(160,130,230,.4);text-align:center;padding:0 24px;}
  #intro .iline.lit{animation:introLine 3.4s ease forwards;}
  @keyframes introLine{0%{opacity:0;transform:translateY(10px)}25%{opacity:1;transform:none}
    80%{opacity:1}100%{opacity:.25}}
  #intro h1{font-family:var(--script);font-weight:400;font-size:clamp(44px,7vw,84px);margin:26px 0 8px;
    color:var(--starlight);opacity:0;transition:opacity 2.4s ease;
    text-shadow:0 0 30px rgba(200,170,255,.7),0 0 90px rgba(140,110,220,.4);}
  #intro .iname{font-family:var(--caps);font-style:normal;font-size:12px;letter-spacing:.55em;
    text-transform:uppercase;color:var(--gold-dim);opacity:0;transition:opacity 2.4s ease .3s;margin-left:.55em;}
  #intro.titled h1,#intro.titled .iname{opacity:1;}
  #beginBtn{margin-top:52px;font-family:var(--script);font-size:21px;color:var(--gold);
    background:none;border:1px solid rgba(233,207,154,.35);border-radius:999px;padding:13px 42px;
    cursor:pointer;opacity:0;transition:all .5s;animation:none;}
  #intro.titled #beginBtn{opacity:1;animation:breathe 3.2s ease-in-out infinite;}
  #beginBtn:hover{background:rgba(233,207,154,.08);border-color:var(--gold);}
  @keyframes breathe{0%,100%{box-shadow:0 0 12px rgba(233,207,154,.12)}
    50%{box-shadow:0 0 34px rgba(233,207,154,.34)}}

  /* ---------------- chrome ---------------- */
  #titleBlock{position:absolute;top:20px;left:30px;z-index:5;pointer-events:none;}
  #titleBlock h1{font-family:var(--script);font-weight:400;font-size:36px;margin:0;
    color:var(--starlight);text-shadow:0 0 18px rgba(190,160,255,.65),0 0 46px rgba(140,110,220,.35);}
  #titleBlock p{font-family:var(--caps);font-style:normal;font-size:10px;letter-spacing:.5em;
    text-transform:uppercase;margin:6px 0 0 5px;color:var(--lav-dim);}

  #hud{position:absolute;top:26px;right:30px;z-index:5;display:flex;flex-direction:column;
    align-items:flex-end;gap:11px;}
  #discCount{font-family:var(--script);font-size:17px;color:var(--starlight);
    text-shadow:0 0 12px rgba(190,160,255,.5);}
  #discCount .plus{color:var(--gold);}
  #musicBtn{font-family:var(--script);font-size:15px;color:var(--lav);cursor:pointer;
    background:var(--glass-soft);border:1px solid var(--line);border-radius:999px;
    padding:8px 19px;transition:all .3s;}
  #musicBtn:hover{color:var(--starlight);border-color:rgba(220,200,255,.45);}
  #musicBtn:focus-visible{outline:1.5px solid var(--gold);outline-offset:2px;}

  /* ---------------- bottom nav ---------------- */
  #navWrap{position:absolute;left:0;right:0;bottom:22px;z-index:6;display:flex;
    justify-content:center;pointer-events:none;}
  #nav{display:flex;gap:3px;background:var(--glass-soft);border:1px solid var(--line);
    border-radius:999px;padding:5px;pointer-events:auto;backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);}
  #nav button{font-family:var(--script);font-size:15.5px;color:var(--lav);background:none;
    border:none;border-radius:999px;padding:9px 19px;cursor:pointer;transition:all .3s;white-space:nowrap;}
  #nav button:hover{color:var(--starlight);}
  #nav button:focus-visible{outline:1.5px solid var(--gold);outline-offset:1px;}
  #nav button.active{background:linear-gradient(105deg,#dbe6ff,#f7dcec);color:#241335;
    box-shadow:0 0 18px rgba(220,190,255,.35);}

  #hint{position:absolute;left:0;right:0;bottom:80px;z-index:5;text-align:center;
    font-family:var(--script);font-size:16px;color:var(--lav);pointer-events:none;
    text-shadow:0 0 10px rgba(120,90,190,.5);transition:opacity .6s;}
  #hint b{color:var(--starlight);font-weight:400;}
  #hint.whispering{color:var(--gold);text-shadow:0 0 14px rgba(233,207,154,.5);}

  /* ---------------- sidebar ---------------- */
  #sidebar{position:absolute;left:26px;top:50%;transform:translate(-16px,-50%);z-index:5;
    opacity:0;pointer-events:none;visibility:hidden;
    transition:opacity .7s ease,transform .7s ease,visibility .7s;max-width:215px;}
  [data-view="galaxy"] #sidebar,[data-view="planet"] #sidebar{
    opacity:1;pointer-events:auto;visibility:visible;transform:translate(0,-50%);}
  #sbTitle{font-family:var(--script);font-size:24px;margin:0 0 13px 4px;color:var(--starlight);
    text-shadow:0 0 14px rgba(190,160,255,.55);}
  #sbList{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  #sbList button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    font-family:var(--script);font-size:16px;color:var(--lav);cursor:pointer;
    background:var(--glass-soft);border:1px solid var(--line);border-radius:999px;
    padding:8px 18px;transition:all .3s;}
  #sbList button:hover{color:var(--starlight);border-color:rgba(220,200,255,.5);transform:translateX(3px);}
  #sbList button:focus-visible{outline:1.5px solid var(--gold);outline-offset:2px;}
  #sbList button.active{background:linear-gradient(105deg,#dbe6ff,#f9d9ea);color:#241335;
    border-color:transparent;box-shadow:0 0 20px rgba(220,190,255,.4);}
  #sbList .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor;}

  /* ---------------- info card ---------------- */
  #card{position:absolute;right:26px;top:116px;bottom:96px;width:410px;max-width:calc(100vw - 52px);
    z-index:7;background:var(--glass);border:1px solid var(--line);border-radius:22px;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 8px 60px rgba(0,0,0,.55),inset 0 0 40px rgba(120,90,200,.06);
    padding:26px 26px 20px;overflow-y:auto;overscroll-behavior:contain;
    opacity:0;pointer-events:none;visibility:hidden;transform:translateX(36px);
    transition:opacity .65s ease,transform .65s ease,visibility .65s;scrollbar-width:thin;
    scrollbar-color:rgba(180,150,230,.3) transparent;}
  [data-view="planet"] #card{opacity:1;pointer-events:auto;visibility:visible;transform:translateX(0);}
  #card .eyebrow{font-size:14.5px;line-height:1.55;color:var(--lav-dim);margin:0 0 10px;}
  #card h2{font-family:var(--script);font-weight:400;font-size:44px;line-height:1.05;margin:0 0 6px;
    color:var(--starlight);text-shadow:0 0 22px rgba(200,170,255,.55);text-wrap:balance;font-style:normal;}
  #card .role{font-family:var(--script);font-size:21px;margin:0 0 2px;color:var(--starlight);font-style:normal;}
  #card .meta{font-size:14.5px;color:var(--lav-dim);margin:0 0 14px;line-height:1.5;}
  #card .orec{border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    padding:10px 2px;margin:0 0 14px;display:flex;flex-direction:column;gap:6px;}
  #card .orec div{display:flex;gap:12px;align-items:baseline;}

  g.fillStyle=gr; g.fillRect(0,0,32,32);
  return c;
})();

/* tinted sprites cache: key = "r,g,b" */
const tintCache = new Map();
function tintedSprite(rgb){
  if(tintCache.has(rgb)) return tintCache.get(rgb);
  const c=document.createElement('canvas'); c.width=c.height=32;
  const g=c.getContext('2d');
  g.drawImage(SPRITE,0,0);
  g.globalCompositeOperation='source-in';
  g.fillStyle=`rgb(${rgb})`;
  g.fillRect(0,0,32,32);
  tintCache.set(rgb,c);
  return c;
}

    g.addColorStop(0,`rgba(${b.c},${b.a})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    nc.fillStyle=g; nc.fillRect(0,0,nw,nh);
  }
  /* golden dust band */
  const g2=nc.createLinearGradient(0,nh*.72,nw,nh*.3);
  g2.addColorStop(0,'rgba(0,0,0,0)');
  g2.addColorStop(.5,'rgba(160,130,70,.05)');
  g2.addColorStop(1,'rgba(0,0,0,0)');
  nc.fillStyle=g2; nc.fillRect(0,0,nw,nh);
}

let shoot=null, nextShoot=6;
function updateShoot(t,dt){
  if(REDUCED) return;
  if(shoot){ shoot.p+=dt/1.1; if(shoot.p>=1) shoot=null; }
  else{
    nextShoot-=dt;
    if(nextShoot<=0){
      nextShoot=7+Math.random()*9;
      const a=Math.PI*(0.65+Math.random()*0.25);
      shoot={x:(.15+Math.random()*.7)*W,y:(.05+Math.random()*.3)*H,
             dx:Math.cos(a),dy:Math.sin(a),len:90+Math.random()*110,p:0};
    }
  }
}
function drawShoot(){
  if(!shoot) return;
  const fade=Math.sin(shoot.p*Math.PI);
  const x=shoot.x+shoot.dx*shoot.p*260, y=shoot.y+shoot.dy*shoot.p*260;
  const g=ctx.createLinearGradient(x,y,x-shoot.dx*shoot.len,y-shoot.dy*shoot.len);
  g.addColorStop(0,`rgba(255,250,240,${.8*fade})`);
  g.addColorStop(1,'rgba(255,250,240,0)');
  ctx.strokeStyle=g; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(x,y);
  ctx.lineTo(x-shoot.dx*shoot.len,y-shoot.dy*shoot.len); ctx.stroke();
}

/* ---------------- galaxy particles ---------------- */
function hsl2rgbStr(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)].join(',');
}
function makeParticles(gal){
  let seed=gal.id==='pro'?42:1337;
  const rnd=()=> (seed=(seed*16807)%2147483647)/2147483647;
  const N=MOBILE?1400:2400;
  const pts=[];
  for(let i=0;i<N;i++){
    const arm=i%2;
    const t=Math.pow(rnd(),.72);
    const theta=t*4.4*Math.PI*.62+arm*Math.PI+(rnd()-.5)*(.9-t*.5);
    const hue=gal.hueA+rnd()*(gal.hueB-gal.hueA);
    const white=rnd()<.18;
    const bucket=Math.round(hue/9)*9;   /* quantized so tinted sprites cache well */
    pts.push({t,theta,z:(rnd()-.5)*.10*(1-t*.5),s:.5+rnd()*1.5,
              a:.25+rnd()*.6,white,tw:.5+rnd()*2,ph:rnd()*6.28,
              rgb:white?'255,250,255':hsl2rgbStr(bucket,72,74)});
  }
  return pts;
}
let particlesBuilt=false;
function ensureParticles(){
  if(particlesBuilt) return;
  for(const g of GALAXIES) g.pts=makeParticles(g);
  particlesBuilt=true;
}

function galPoint(ang,rad,cosT,rot){
  const x0=Math.cos(ang)*rad, y0=Math.sin(ang)*rad*cosT;
  return {x:x0*Math.cos(rot)-y0*Math.sin(rot),
          y:x0*Math.sin(rot)+y0*Math.cos(rot),
          depth:Math.sin(ang)};
}

function drawGalaxy(g,time){
  const {cx,cy,scale,alpha,rot,cosT}=g.cur;
  if(alpha<.01){ g.screen=null; return; }
  const spin=REDUCED?time*.004:time*.03;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(const p of g.pts){
    const ang=p.theta+spin*(1.7-p.t);
    const pt=galPoint(ang,p.t*scale,cosT,rot);
    const tw=.72+.28*Math.sin(time*p.tw+p.ph);
    const a=p.a*alpha*tw;
    if(a<.015) continue;
    const px=cx+pt.x, py=cy+pt.y+p.z*scale;
    const sz=p.s*(scale/(MINDIM*.5))*1.15;
    const spr=tintedSprite(p.rgb);
    const sr=sz*1.35+.4;
    ctx.globalAlpha=Math.min(1,a);
    ctx.drawImage(spr,px-sr,py-sr,sr*2,sr*2);
  }
  ctx.globalAlpha=1;
  /* core glow + cross flare */
  const coreR=Math.min(scale*.30, MINDIM*.15);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  cg.addColorStop(0,g.coreTint+(.9*alpha)+')');
  cg.addColorStop(.25,g.coreTint+(.32*alpha)+')');
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.arc(cx,cy,coreR,0,6.29); ctx.fill();
  const fl=scale*.5, fa=.28*alpha*(0.8+0.2*Math.sin(time*.7));
  const flg=ctx.createLinearGradient(cx-fl,cy,cx+fl,cy);
  flg.addColorStop(0,'rgba(255,255,255,0)');
  flg.addColorStop(.5,`rgba(255,252,255,${fa})`);
  flg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.strokeStyle=flg; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(cx-fl,cy); ctx.lineTo(cx+fl,cy); ctx.stroke();
  ctx.restore();
  g.screen={x:cx,y:cy,r:scale*.85};
}

/* ---------------- particle planets ---------------- */
const SPHERE_N = 1300;
const SPHERE = [];
(function(){
  const GA = Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<SPHERE_N;i++){
    const y = 1-(i+0.5)*2/SPHERE_N;
    const r = Math.sqrt(1-y*y);
    const a = i*GA;
    const v =(i*2654435761 % 1000)/1000;           /* stable pseudo-random per point */
    const j2=(i*40503 % 1000)/1000, j3=(i*9176 % 1000)/1000;
    SPHERE.push({x:Math.cos(a)*r+(v-.5)*.09,       /* jitter breaks the lattice banding */
                 y:y+(j2-.5)*.09,
                 z:Math.sin(a)*r+(j3-.5)*.09, v});
  }
})();

function hexToRgb(hex){
  return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].join(',');
}

function drawParticlePlanet(w,x,y,r,alpha,time,focused){
  const pal=w.pal;
  if(!w._rgb){ w._rgb={hi:hexToRgb(pal.hi),mid:hexToRgb(pal.mid),lo:hexToRgb(pal.lo)}; }
  ctx.save();

  /* faint atmosphere */
  const glow=ctx.createRadialGradient(x,y,r*.4,x,y,r*2.3);
  glow.addColorStop(0,`rgba(${pal.glow},${.30*alpha})`);
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.arc(x,y,r*2.3,0,6.29); ctx.fill();

  ctx.globalCompositeOperation='lighter';

  const K = Math.max(160, Math.min(SPHERE_N, Math.floor(r*(focused?7:11))));
  const step = SPHERE_N/K;
  const ry = time*(REDUCED?.02:.14)*(w.spinDir||1) + (w.phase||0);
  const cy_=Math.cos(ry), sy_=Math.sin(ry);
  const tilt=-.32, ct=Math.cos(tilt), st=Math.sin(tilt);
  const xt=.42, cxt=Math.cos(xt), sxt=Math.sin(xt);

  const sprHi=tintedSprite(w._rgb.hi), sprMid=tintedSprite(w._rgb.mid), sprLo=tintedSprite(w._rgb.lo);

  /* ring particles behind */
  let ringPts=null;
  if(w.ring){
    ringPts=[];
    const M=Math.max(50,Math.floor(r*2.2));
    for(let i=0;i<M;i++){
      const a=i/M*6.283 + time*(REDUCED?.02:.1);
      const rr=r*(1.55+.30*((i*2654435761%97)/97));
      let rx=Math.cos(a)*rr, rz=Math.sin(a)*rr, ryy=0;
      let y2=ryy*cxt-rz*sxt, z2=ryy*sxt+rz*cxt;
      let x3=rx*ct-y2*st, y3=rx*st+y2*ct;
      ringPts.push({sx:x+x3,sy:y+y3,z:z2,vi:(i*7%10)/10});
    }
    for(const p of ringPts){
      if(p.z>=0) continue;
      const s=(1.1+p.vi*1.2)*Math.max(1,r/70);
      ctx.globalAlpha=alpha*(.14+.25*p.vi);
      ctx.drawImage(sprMid,p.sx-s,p.sy-s,s*2,s*2);
    }
  }

  /* sphere shell */
  for(let i=0;i<K;i++){
    const p=SPHERE[Math.floor(i*step)];
    const x1=p.x*cy_+p.z*sy_, z1=-p.x*sy_+p.z*cy_, y1=p.y;
    const y2=y1*cxt-z1*sxt, z2=y1*sxt+z1*cxt;
    const x3=x1*ct-y2*st, y3=x1*st+y2*ct;
    const front=(z2+1)/2;
    const tw=.80+.20*Math.sin(time*(1+p.v*2.2)+p.v*6.28);
    const a=alpha*tw*(.16+.84*front);
    if(a<.02) continue;
    const spr = p.v<.25? sprHi : (p.v<.62? sprMid : sprLo);
    const s=(.7+front*1.15)*(.9+p.v*.6)*Math.max(1.15,r/40);
    ctx.globalAlpha=Math.min(1,a);
    ctx.drawImage(spr, x+x3*r-s, y+y3*r-s, s*2, s*2);
  }

  /* inner luminous heart \u2014 hints at mass without solidity */
  ctx.globalAlpha=1;
  const heart=ctx.createRadialGradient(x,y,0,x,y,r*.6);
  heart.addColorStop(0,`rgba(${w._rgb.hi},${.5*alpha})`);
  heart.addColorStop(.55,`rgba(${pal.glow},${.16*alpha})`);
  heart.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=heart;
  ctx.beginPath(); ctx.arc(x,y,r*.6,0,6.29); ctx.fill();

  /* ring particles in front */
  if(ringPts){
    for(const p of ringPts){
      if(p.z<0) continue;
      const s=(1.1+p.vi*1.2)*Math.max(1,r/70);
      ctx.globalAlpha=alpha*(.22+.34*p.vi);
      ctx.drawImage(sprMid,p.sx-s,p.sy-s,s*2,s*2);
    }
  }

  /* focused: slow sparkle swarm */
  if(focused && !REDUCED){
    for(let i=0;i<18;i++){
      const a2=time*.4+i*.35;
      const rr=r*(1.5+.55*Math.sin(i*2.1+time*.2));
      const sx=x+Math.cos(a2)*rr, sy=y+Math.sin(a2)*rr*.42;
      const sa=.22+.22*Math.sin(time*2+i*1.7);
      ctx.globalAlpha=sa;
      const s=1.6+((i*37)%10)/6;
      ctx.drawImage(sprHi,sx-s,sy-s,s*2,s*2);
    }
  }
  ctx.restore();
}

/* wandering dark comet */
const comet={found:false, screen:null, blend:0, alpha:0};
function cometPos(time){
  const t=time*.021;
  return {x:W*(.5+.42*Math.sin(t*1.0+1.3)),
          y:H*(.42+.30*Math.sin(t*1.7+4.1))};
}
function drawComet(time,dt){
  const inUniverse = state.view==='universe';
  const focusedHere = state.world===WANDERER && state.view==='planet';
  const targetA = focusedHere?1:(inUniverse?(allFound()?.85:.4):0);
  comet.alpha=expEase(comet.alpha,targetA,dt,2.5);
  comet.blend=expEase(comet.blend,focusedHere?1:0,dt,3.2);
  if(comet.alpha<.02){ comet.screen=null; return; }
  const p=cometPos(time), f=focusPos();
  const b=comet.blend;
  const x=p.x+(f.x-p.x)*b, y=p.y+(f.y-p.y)*b;
  const r=(9+(comet.hover?3:0))*(1-b)+f.r*.5*b;
  const a=comet.alpha;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const spr=tintedSprite('170,150,230'), sprW=tintedSprite('232,226,255');
  /* tail */
  const tn=focusedHere?26:14;
  for(let i=0;i<tn;i++){
    const tt=i/tn;
    const tx=x+Math.sin(time*.35+i*.5)*4*tt - tt*r*4.2;
    const ty=y+Math.cos(time*.3+i*.7)*3*tt - tt*r*1.4;
    const s=(1-tt)*r*.5+.6;
    ctx.globalAlpha=a*(1-tt)*.35;
    ctx.drawImage(spr,tx-s,ty-s,s*2,s*2);
  }
  /* knot of dark light */
  for(let i=0;i<(focusedHere?90:22);i++){
    const v=(i*2654435761%1000)/1000;
    const aa=v*6.283+time*(.3+v*.4);
    const rr=r*(.15+.85*Math.pow(v,.6));
    const kx=x+Math.cos(aa)*rr, ky=y+Math.sin(aa)*rr*.8;
    const s=(.5+v*1.4)*(focusedHere?1.6:1);
    ctx.globalAlpha=a*(.25+.5*(1-v));
    ctx.drawImage(v<.3?sprW:spr,kx-s,ky-s,s*2,s*2);
  }
  ctx.restore();
  comet.screen={x,y,r:Math.max(26,r*2.4)};
  if(!focusedHere && inUniverse && a>.3){
    drawLabel(comet.hover?'something uncharted':'?', x, y-r*2.4-8, 13, a*(comet.hover?.85:.35),
              'rgba(170,150,230,.9)');
  }
}
function allFound(){ return discovered.size>=TOTAL; }

/* ---------------- star chart ---------------- */
let chartLayout=null;
function clampText(text,maxW){
  if(ctx.measureText(text).width<=maxW) return text;
  let t=text;
  while(t.length>1&&ctx.measureText(t+'\u2026').width>maxW) t=t.slice(0,-1);
  return t.trimEnd()+'\u2026';
}
function layoutChart(){
  /* positions in unit space, re-laid on resize */
  const cols = MOBILE? 2 : (CONSTELLATIONS.length<=4? 2 : 3);
  const cw=1/cols;
  chartLayout=CONSTELLATIONS.map((c,ci)=>{
    const col=ci%cols, row=Math.floor(ci/cols);
    const cx=cw*col+cw/2 + ((row%2)?cw*.06:-cw*.06);
    const cy=MOBILE? .21+row*.26 : .32+row*.34;
    let seed=ci*7919+13;
    const rnd=()=> (seed=(seed*16807)%2147483647)/2147483647;
    const stars=c.stars.map((s,si)=>{
      const ang=si/c.stars.length*6.283+rnd()*1.1;
      const rad=(.28+rnd()*.72);
      return {label:s,
        x:cx+Math.cos(ang)*rad*cw*.36,
        y:cy+Math.sin(ang)*rad*(MOBILE?.085:.115),
        tw:.5+rnd()*2, ph:rnd()*6.28, big:rnd()<.3};
    });
    return {c, cx, cy, stars};
  });
}
let chartAlpha=0;
function drawChart(time,dt){
  const target=state.view==='chart'?1:0;
  chartAlpha=expEase(chartAlpha,target,dt,3);
  if(chartAlpha<.02) return;
  const a=chartAlpha;
  ctx.save();
  const sprW=tintedSprite('245,240,255'), sprG=tintedSprite('233,207,154');
  for(const cl of chartLayout){
    const hover=cl.hover?1:0;
    /* connecting lines */
    ctx.strokeStyle=`rgba(233,207,154,${a*(.14+.15*hover)})`;
    ctx.lineWidth=.7;
    ctx.beginPath();
    cl.stars.forEach((s,i)=>{
      const x=s.x*W, y=s.y*H;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.globalCompositeOperation='lighter';
    for(const s of cl.stars){
      const x=s.x*W, y=s.y*H;
      const tw=.6+.4*Math.sin(time*s.tw+s.ph);
      const sz=(s.big?2.6:1.7)+hover*.8;
      ctx.globalAlpha=a*tw*(.75+.25*hover);
      ctx.drawImage(s.big?sprG:sprW,x-sz,y-sz,sz*2,sz*2);
    }
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
    /* star labels */
    ctx.font=`italic ${MOBILE?10:11.5}px 'Cormorant Garamond',Georgia,serif`;
    ctx.textAlign='left';
    ctx.fillStyle=`rgba(201,182,230,${a*(.6+.4*hover)})`;
    for(const s of cl.stars){
      ctx.fillText(s.label, s.x*W+7, s.y*H+3.5);
    }
    /* constellation name \u2014 held well above the tallest star of the cluster */
    const nameY=cl.cy*H-(MOBILE?H*.075:MINDIM*.155);
    drawLabel(cl.c.name, cl.cx*W, nameY, MOBILE?19:24, a*(.85+.15*hover),
              'rgba(233,207,154,.8)');
    ctx.font=`italic ${MOBILE?10.5:12.5}px 'Cormorant Garamond',Georgia,serif`;
    ctx.textAlign='center';
    ctx.fillStyle=`rgba(150,129,158,${a*.9})`;
    const tagMaxW=W/(MOBILE?2:(CONSTELLATIONS.length<=4?2:3))*.92;
    ctx.fillText(clampText(cl.c.tag,tagMaxW), cl.cx*W, nameY+(MOBILE?14:17));
  }
  ctx.restore();
}

/* ---------------- labels ---------------- */
function drawLabel(text,x,y,size,alpha,glowCol){
  if(alpha<.02) return;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.font=`${size}px 'Great Vibes','Snell Roundhand','Apple Chancery',cursive`;
  ctx.textAlign='center';
  ctx.shadowColor=glowCol||'rgba(210,180,255,.9)';
  ctx.shadowBlur=14;
  ctx.fillStyle='rgba(250,246,255,.95)';
  ctx.fillText(text,x,y);
  ctx.restore();
}

/* ---------------- state & easing ---------------- */
const state={view:'universe',galaxy:null,world:null};
const look={x:0,y:0,tx:0,ty:0};
const discovered=new Set();

for(const g of GALAXIES){
  g.cur={cx:0,cy:0,scale:0,alpha:0,rot:0,cosT:.5,init:false};
  for(const w of g.worlds){ w.blend=0; w.alpha=0; w.screen=null; w.hover=0;
    w.phase=Math.random()*6.28; w.spinDir=Math.random()<.5?-1:1; }
}

function expEase(cur,tgt,dt,k){ return cur+(tgt-cur)*(1-Math.exp(-k*dt)); }

function galaxyTargets(g,time){
  const active=state.galaxy===g;
  const uA=g.uAnchor;
  const bob=REDUCED?0:Math.sin(time*.12+(g.id==='pro'?0:2.2))*7;
  if(state.view==='universe'||state.view==='chart'){
    const chartMode=state.view==='chart';
    const px=MOBILE?.5:uA.x;
    const py=MOBILE?(g.id==='pro'?.36:.68):uA.y;
    return {cx:px*W+look.x*36*(g.id==='pro'?1:.65),
            cy:py*H+bob+look.y*26*(g.id==='pro'?1:.65),
            scale:MINDIM*(MOBILE?.26:.23),
            alpha:chartMode?0:1, rot:g.uRot, cosT:.48};
  }
  if(!active) return {cx:W*.5,cy:H*.5,scale:MINDIM*1.6,alpha:0,rot:g.uRot,cosT:.48};
  if(state.view==='galaxy'){
    /* keep the outermost orbit's worlds reachable on narrow screens */
    const maxOrbit=Math.max(...g.worlds.map(w=>w.orbit));
    const fitScale=(W*.5-40)/(maxOrbit*.92);
    return {cx:W*(MOBILE?.5:.54)+look.x*14, cy:H*.46+look.y*10,
            scale:Math.min(MINDIM*.62,fitScale), alpha:.95, rot:g.gRot, cosT:.34};
  }
  return {cx:W*(MOBILE?.5:.40), cy:H*.52,
          scale:MINDIM*.85, alpha:.4, rot:g.gRot, cosT:.34};
}

function focusPos(){
  if(MOBILE) return {x:W*.5,y:H*.22,r:MINDIM*.17};
  return {x:(W-462)*.5+26,y:H*.46,r:MINDIM*.23};
}

/* ---------------- main loop ---------------- */
let last=0;
function frame(ts){
  const time=ts/1000;
  const dt=Math.min(.05,(ts-last)/1000||.016);
  last=ts;
  ensureParticles();

  look.x=expEase(look.x,look.tx,dt,4);
  look.y=expEase(look.y,look.ty,dt,4);

  ctx.fillStyle='#04020c';
  ctx.fillRect(0,0,W,H);
  if(nebCanvas){
    const drift=REDUCED?0:Math.sin(time*.03)*14;
    ctx.drawImage(nebCanvas,-20+drift+look.x*10,-20+look.y*8,W+40,H+40);
  }
  /* background constellations */
  ctx.strokeStyle='rgba(190,175,230,.05)';
  ctx.lineWidth=.6;
  for(const pts of BG_CONST){
    ctx.beginPath();
    pts.forEach((p,i)=>{const x=p.x*W+look.x*6,y=p.y*H+look.y*5;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
    ctx.stroke();
  }
  for(const s of stars){
    const a=s.base*(.55+.45*Math.sin(time*s.sp+s.ph));
    ctx.fillStyle=`rgba(235,230,255,${a})`;
    ctx.fillRect(s.x*W,s.y*H,s.r,s.r);
  }
  updateShoot(time,dt); drawShoot();

  for(const g of GALAXIES){
    const t=galaxyTargets(g,time);
    const c=g.cur;
    if(!c.init){ Object.assign(c,t,{init:true}); }
    c.cx=expEase(c.cx,t.cx,dt,3.2); c.cy=expEase(c.cy,t.cy,dt,3.2);
    c.scale=expEase(c.scale,t.scale,dt,3.2);
    c.alpha=expEase(c.alpha,t.alpha,dt,3.2);
    c.rot=expEase(c.rot,t.rot,dt,3.2);
    c.cosT=expEase(c.cosT,t.cosT,dt,3.2);
    drawGalaxy(g,time);
  }

  if(state.view==='universe'){
    for(const g of GALAXIES){
      if(g.cur.alpha>.3){
        const hoverLift=g.hover?1.15:1;
        drawLabel(g.name,g.cur.cx,g.cur.cy-g.cur.scale*.62,17*hoverLift,g.cur.alpha*.95);
        if(!MOBILE) drawLabel(g.tag,g.cur.cx,g.cur.cy+g.cur.scale*.72,13,g.cur.alpha*.5);
      }
    }
  }

  for(const g of GALAXIES){
    const inCosmos=state.galaxy===g&&(state.view==='galaxy'||state.view==='planet');
    const c=g.cur;
    const targetA=inCosmos?1:0;
    const drawables=[];
    for(const w of g.worlds){
      w.alpha=expEase(w.alpha,targetA,dt,3.4);
      w.blend=expEase(w.blend,(state.world===w&&state.view==='planet')?1:0,dt,3.4);
      w.hover=expEase(w.hover,w.hovered?1:0,dt,8);
      if(w.alpha<.02&&w.blend<.02){ w.screen=null; continue; }
      if(!('ang' in w)) w.ang=(g.worlds.indexOf(w)/g.worlds.length)*6.28+(g.id==='pro'?.6:2.4);
      if(!REDUCED&&state.view!=='planet') w.ang+=dt*.05*(1.3-w.orbit*.5);
      const pt=galPoint(w.ang,w.orbit*c.scale*.92,c.cosT,c.rot);
      const depthScale=1+pt.depth*.16;
      let px=c.cx+pt.x, py=c.cy+pt.y;
      let pr=w.size*(MINDIM/900)*depthScale*(1+w.hover*.12)*(c.scale/(MINDIM*.62));
      const f=focusPos(), b=w.blend;
      px=px+(f.x-px)*b; py=py+(f.y-py)*b; pr=pr+(f.r-pr)*b;
      const a=Math.max(w.alpha,b);
      drawables.push({w,px,py,pr,a,depth:pt.depth+b*10});
      w.screen=a>.25?{x:px,y:py,r:Math.max(pr*1.6,26)}:null;
    }
    if(drawables.length){
      const ringA=Math.max(...drawables.map(d=>d.w.alpha))*.22;
      if(ringA>.01){
        ctx.save();
        ctx.strokeStyle=`rgba(200,185,235,${ringA})`;
        ctx.lineWidth=.7;
        for(const w of g.worlds){
          ctx.beginPath();
          ctx.ellipse(c.cx,c.cy,w.orbit*c.scale*.92,w.orbit*c.scale*.92*c.cosT,c.rot,0,6.29);
          ctx.stroke();
        }
        ctx.restore();
      }
      drawables.sort((A,B)=>A.depth-B.depth);
      for(const d of drawables){
        drawParticlePlanet(d.w,d.px,d.py,d.pr,d.a,time,d.w.blend>.5);
        const la=d.a*(state.view==='planet'?(d.w.blend>.5?.9:.25):(.55+d.w.hover*.45));
        const b2=d.w.blend;
        /* keep labels clear of the sidebar and the bottom chrome */
        if(!MOBILE&&b2<.5&&d.px<245&&state.view!=='universe') continue;
        const lSize=Math.max(13,d.pr*(0.42-0.24*b2));
        const lOff=d.pr*(1.9-0.66*b2)+14;
        let ly=d.py+lOff;
        if(b2>.5) ly=Math.min(ly,H-150);
        drawLabel(d.w.name,d.px,ly,lSize,la,`rgba(${d.w.pal.glow},.9)`);
      }
    }
  }

  drawComet(time,dt);
  drawChart(time,dt);
  updateCursor();
  requestAnimationFrame(frame);
}

/* ---------------- interaction ---------------- */
let pDown=null,dragging=false;
canvas.addEventListener('pointerdown',e=>{
  pDown={x:e.clientX,y:e.clientY,lx:look.tx,ly:look.ty};
  dragging=false;
});
window.addEventListener('pointermove',e=>{
  if(pDown){
    const dx=e.clientX-pDown.x, dy=e.clientY-pDown.y;
    if(Math.abs(dx)+Math.abs(dy)>7) dragging=true;
    if(dragging){
      look.tx=Math.max(-1,Math.min(1,pDown.lx+dx/(W*.5)));
      look.ty=Math.max(-1,Math.min(1,pDown.ly+dy/(H*.5)));
    }
  }
  hover(e.clientX,e.clientY);
});
window.addEventListener('pointerup',e=>{
  const wasDown=pDown!==null, wasDrag=dragging;
  pDown=null; dragging=false;
  if(!wasDown||wasDrag) return;
  if(e.target!==canvas) return;
  click(e.clientX,e.clientY);
});
window.addEventListener('pointercancel',()=>{ pDown=null; dragging=false; });

let hoverTarget=null;
function hover(mx,my){
  hoverTarget=null;
  comet.hover=false;
  for(const g of GALAXIES) g.hover=false;
  for(const w of ALL_WORLDS) w.hovered=false;
  if(state.view==='chart'){
    for(const cl of chartLayout) cl.hover=false;
    let best=null,bd=1e9;
    for(const cl of chartLayout){
      const d=Math.hypot(mx-cl.cx*W,my-cl.cy*H);
      if(d<MINDIM*.18&&d<bd){best=cl;bd=d;}
    }
    if(best) best.hover=true;
    return;
  }
  if(state.view==='universe'){
    if(comet.screen&&Math.hypot(mx-comet.screen.x,my-comet.screen.y)<comet.screen.r){
      comet.hover=true; hoverTarget=WANDERER; return;
    }
    for(const g of GALAXIES){
      if(g.screen&&Math.hypot(mx-g.screen.x,my-g.screen.y)<g.screen.r*.7){
        g.hover=true; hoverTarget=g; break;
      }
    }
  } else {
    let best=null,bd=1e9;
    for(const w of (state.galaxy?state.galaxy.worlds:[])){
      if(!w.screen) continue;
      const d=Math.hypot(mx-w.screen.x,my-w.screen.y);
      if(d<w.screen.r&&d<bd){best=w;bd=d;}
    }
    if(best){best.hovered=true;hoverTarget=best;}
  }
}
function updateCursor(){
  canvas.style.cursor=dragging?'grabbing':(hoverTarget?'pointer':'grab');
}
function click(mx,my){
  hover(mx,my);
  if(!hoverTarget) return;
  if(hoverTarget===WANDERER){ enterWanderer(); return; }
  if(state.view==='universe'){ enterGalaxy(hoverTarget); }
  else { enterWorld(hoverTarget); }
}
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(state.view==='planet'){
      if(state.world===WANDERER) goUniverse();
      else enterGalaxy(state.galaxy);
    }
    else if(state.view==='galaxy'||state.view==='chart') goUniverse();
  }
});

/* ---------------- view changes & DOM ---------------- */
const app=document.getElementById('app');
const sidebarEl=document.getElementById('sidebar');
const hudEl=document.getElementById('hud');
const navWrapEl=document.getElementById('navWrap');
const hintEl=document.getElementById('hint');
const sbTitle=document.getElementById('sbTitle');
const sbList=document.getElementById('sbList');
const cardEl=document.getElementById('card');
const toastEl=document.getElementById('toast');
const discEl=document.getElementById('discCount');
const navBtns=[...document.querySelectorAll('#nav button')];

const HINTS={
  universe:'Two galaxies drift before you &mdash; <b>click one to enter</b>, or drag to look around',
  galaxy:'<b>Click a world</b> to land on it &nbsp;&middot;&nbsp; press <b>Esc</b> to return to the universe',
  planet:'Press <b>Esc</b> or &ldquo;Return to orbit&rdquo; to leave this world',
  chart:'The traveller&rsquo;s skills, charted as constellations of the northern dark'
};
const WHISPER='Nine worlds wear their tags in the open; a tenth crosses the dark unlisted. Listen for the comet that refused a price.';

function setView(v){
  state.view=v;
  app.dataset.view=v;
  cardEl.inert = v!=='planet';
  sidebarEl.inert = v!=='galaxy'&&v!=='planet';
  updateHint();
  navBtns.forEach(b=>{
    const k=b.dataset.nav;
    b.classList.toggle('active',
      (k==='universe'&&v==='universe')||
      (k==='chart'&&v==='chart')||
      ((k==='pro'||k==='dream')&&(v==='galaxy'||v==='planet')&&state.galaxy&&state.galaxy.id===k));
  });
}
function updateHint(){
  const v=state.view;
  if(v==='universe'&&allFound()&&!comet.found){
    hintEl.innerHTML=WHISPER; hintEl.classList.add('whispering');
  } else {
    hintEl.innerHTML=HINTS[v]||''; hintEl.classList.remove('whispering');
  }
}

function goUniverse(){ state.world=null; setView('universe'); }
function goChart(){ state.world=null; setView('chart'); }

function enterGalaxy(g){
  state.galaxy=g; state.world=null;
  buildSidebar(g);
  setView('galaxy');
}

function enterWorld(w){
  if(w===WANDERER){ enterWanderer(); return; }
  state.galaxy=w.gal; state.world=w;
  buildSidebar(w.gal);
  buildCard(w);
  setView('planet');
  if(!discovered.has(w.id)){
    discovered.add(w.id);
    refreshCount();
    toast(`&#10022; Entered in the ledger \u2014 &mdash; ${w.name}`);
    if(allFound()) setTimeout(updateHint, 2800);
  }
}

function enterWanderer(){
  state.galaxy=null; state.world=WANDERER;
  sbTitle.textContent=''; sbList.innerHTML='';
  buildCard(WANDERER);
  setView('planet');
  if(!comet.found){
    comet.found=true;
    refreshCount();
    toast('&#10023; A tenth signature, unpriced. The comet answers only to offers.');
  }
}

function refreshCount(){
  discEl.innerHTML=`&#10022; ${discovered.size} / ${TOTAL} worlds discovered`+
    (comet.found?' <span class="plus">&middot; +1 uncharted</span>':'');
}

function buildSidebar(g){
  sbTitle.textContent=g.name;
  sbList.innerHTML='';
  for(const w of g.worlds){
    const li=document.createElement('li');
    const b=document.createElement('button');
    b.innerHTML=`<span class="dot" style="background:${w.pal.mid};color:${w.pal.mid}"></span>${w.name}`;
    b.classList.toggle('active',state.world===w);
    b.addEventListener('click',()=>enterWorld(w));
    li.appendChild(b); sbList.appendChild(li);
  }
}

function buildCard(w){
  const g=w.gal;
  let html=`
    <p class="eyebrow">${g?g.name:'Between the galaxies'} &nbsp;&middot;&nbsp; ${w.flavor}</p>
    <h2>${w.name}</h2>
    <p class="role">${w.role}</p>
    <p class="meta">${w.meta}</p>
    <div class="orec">
      <div><span>Epoch</span><em>${w.epoch}</em></div>
      <div><span>Class</span><em>${w.klass}</em></div>
      <div><span>Signal</span><em>${w.signal}</em></div>
    </div>
    <p class="story">${w.story}</p>`;
  if(w.bullets&&w.bullets.length){
    html+=`<ul${w.credo?' class="credo"':''}>`+w.bullets.map(b=>`<li>${b}</li>`).join('')+'</ul>';
  }
  if(w.closing) html+=`<p class="closing">${w.closing}</p>`;
  if(w.links){
    html+='<div class="links">'+w.links.map(l=>
      `<a href="${l.href}" target="_blank" rel="noopener"><span class="lk">${l.k}</span>${l.label}</a>`).join('')+'</div>';
  }
  html+='<div class="chips">'+w.chips.map(c=>`<span>${c}</span>`).join('')+'</div>';
  html+=`<button id="returnBtn">&larr; Return to orbit</button>`;
  cardEl.innerHTML=html;
  cardEl.scrollTop=0;
  document.getElementById('returnBtn').addEventListener('click',()=>{
    if(w===WANDERER) goUniverse(); else enterGalaxy(g);
  });
  if(g) buildSidebar(g);
}

let toastTimer=null;
function toast(msg){
  toastEl.innerHTML=msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('show'),2800);
}

navBtns.forEach(b=>b.addEventListener('click',()=>{
  const k=b.dataset.nav;
  if(k==='universe') goUniverse();
  else if(k==='chart') goChart();
  else enterGalaxy(GALAXIES.find(g=>g.id===k));
}));

/* ---------------- ambient music ---------------- */
let AC=null,master=null,musicOn=true,audioBuilt=false;
const musicBtn=document.getElementById('musicBtn');
function midi(m){ return 440*Math.pow(2,(m-69)/12); }

function buildAudio(){
  if(audioBuilt) return;
  const Ctx=window.AudioContext||window.webkitAudioContext;
  if(!Ctx) return;
  AC=new Ctx(); audioBuilt=true;
  master=AC.createGain(); master.gain.value=0;
  master.connect(AC.destination);

  /* deep drone */
  const droneGain=AC.createGain(); droneGain.gain.value=.085;
  const droneLP=AC.createBiquadFilter(); droneLP.type='lowpass'; droneLP.frequency.value=260;
  droneGain.connect(droneLP); droneLP.connect(master);
  [[24.5,'sine',.7],[49,'sine',1],[73.42,'sine',.5],[98.2,'triangle',.2]].forEach(([f,t,g])=>{
    const o=AC.createOscillator(); o.type=t; o.frequency.value=f;
    const og=AC.createGain(); og.gain.value=g;
    o.connect(og); og.connect(droneGain); o.start();
  });
  const lfo=AC.createOscillator(); lfo.frequency.value=.045;
  const lfoG=AC.createGain(); lfoG.gain.value=.028;
  lfo.connect(lfoG); lfoG.connect(droneGain.gain); lfo.start();

  /* space echo */
  const delay=AC.createDelay(2); delay.delayTime.value=.46;
  const fb=AC.createGain(); fb.gain.value=.42;
  const fbLP=AC.createBiquadFilter(); fbLP.type='lowpass'; fbLP.frequency.value=2200;
  delay.connect(fb); fb.connect(fbLP); fbLP.connect(delay);
  const wet=AC.createGain(); wet.gain.value=.5;
  delay.connect(wet); wet.connect(master);

  /* pads */
  const CHORDS=[[43,50,58,69],[39,46,62,67],[41,48,60,65],[46,53,62,70]];
  let ci=0;
  const padSend=AC.createGain(); padSend.gain.value=.13; padSend.connect(delay);
  function playChord(){
    if(!AC||AC.state!=='running'){ setTimeout(playChord,2000); return; }
    const notes=CHORDS[ci%CHORDS.length]; ci++;
    const t0=AC.currentTime;
    for(const m of notes){
      const o=AC.createOscillator(); o.type='sine'; o.frequency.value=midi(m);
      const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=midi(m)*1.003;
      const g=AC.createGain();
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(.027,t0+5.5);
      g.gain.setValueAtTime(.027,t0+11.5);
      g.gain.linearRampToValueAtTime(0,t0+19);
      o.connect(g); o2.connect(g); g.connect(master); g.connect(padSend);
      o.start(t0); o2.start(t0); o.stop(t0+19.5); o2.stop(t0+19.5);
    }
    setTimeout(playChord,14000);
  }
  playChord();

  /* deep call \u2014 a slow dark bell every ~26s */
  function deepCall(){
    if(AC&&AC.state==='running'&&musicOn){
      const t0=AC.currentTime;
      const o=AC.createOscillator(); o.type='sine';
      o.frequency.setValueAtTime(196,t0);
      o.frequency.exponentialRampToValueAtTime(98,t0+5);
      const g=AC.createGain();
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(.05,t0+.8);
      g.gain.exponentialRampToValueAtTime(.0004,t0+7);
      o.connect(g); g.connect(master); g.connect(delay);
      o.start(t0); o.stop(t0+7.5);
    }
    setTimeout(deepCall,22000+Math.random()*12000);
  }
  setTimeout(deepCall,9000);

  /* sparkle plucks */
  const PENTA=[79,82,84,86,89,91,94];
  function sparkle(){
    if(AC&&AC.state==='running'&&musicOn){
      const m=PENTA[Math.floor(Math.random()*PENTA.length)];
      const t0=AC.currentTime;
      const o=AC.createOscillator(); o.type='sine'; o.frequency.value=midi(m);
      const g=AC.createGain();
      g.gain.setValueAtTime(0,t0);
      g.gain.linearRampToValueAtTime(.042,t0+.02);
      g.gain.exponentialRampToValueAtTime(.0004,t0+2.4);
      let pan=null;
      if(AC.createStereoPanner){ pan=AC.createStereoPanner(); pan.pan.value=Math.random()*1.4-.7; }
      o.connect(g);
      if(pan){ g.connect(pan); pan.connect(master); pan.connect(delay); }
      else { g.connect(master); g.connect(delay); }
      o.start(t0); o.stop(t0+2.6);
    }
    setTimeout(sparkle,2600+Math.random()*4200);
  }
  setTimeout(sparkle,1800);

  /* cosmic wind */
  const nb=AC.createBuffer(1,AC.sampleRate*3,AC.sampleRate);
  const d=nb.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  const noise=AC.createBufferSource(); noise.buffer=nb; noise.loop=true;
  const nf=AC.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=620; nf.Q.value=.8;
  const ng=AC.createGain(); ng.gain.value=.012;
  noise.connect(nf); nf.connect(ng); ng.connect(master); noise.start();
  const nlfo=AC.createOscillator(); nlfo.frequency.value=.021;
  const nlfoG=AC.createGain(); nlfoG.gain.value=260;
  nlfo.connect(nlfoG); nlfoG.connect(nf.frequency); nlfo.start();
}

function setMusic(on){
  musicOn=on;
  musicBtn.innerHTML=on?'&#9834; signal audible':'&#9834; running silent';
  musicBtn.setAttribute('aria-pressed',String(on));
  if(AC&&master){
    if(AC.state==='suspended'&&on) AC.resume();
    const t=AC.currentTime;
    master.gain.cancelScheduledValues(t);
    master.gain.setValueAtTime(master.gain.value,t);
    master.gain.linearRampToValueAtTime(on?.9:0,t+1.2);
  }
}
musicBtn.addEventListener('click',e=>{
  e.stopPropagation();
  buildAudio();
  if(AC&&AC.state==='suspended') AC.resume();
  setMusic(!musicOn);
});

/* ---------------- intro sequence ---------------- */
const introEl=document.getElementById('intro');
const beginBtn=document.getElementById('beginBtn');
function unlockChrome(){
  introEl.inert=true;
  hudEl.removeAttribute('inert');
  navWrapEl.removeAttribute('inert');
}
function runIntro(){
  if(location.hash==='#skipintro'){
    /* silent dismissal: no user gesture happened, so audio must stay off */
    introEl.classList.add('gone');
    unlockChrome();
    setMusic(false);
    return;
  }
  const lines=introEl.querySelectorAll('.iline');
  const step=REDUCED?10:2400;
  lines.forEach((l,i)=>setTimeout(()=>l.classList.add('lit'),400+i*step));
  setTimeout(()=>introEl.classList.add('titled'),400+lines.length*step*(REDUCED?.01:.82));
}
function dismissIntro(){
  introEl.classList.add('gone');
  unlockChrome();
  buildAudio();
  if(AC&&AC.state==='suspended') AC.resume();
  if(musicOn) setMusic(true);
}
beginBtn.addEventListener('click',dismissIntro);
introEl.addEventListener('click',e=>{
  if(introEl.classList.contains('titled')) dismissIntro();
});

/* ---------------- boot ---------------- */
resize();
setView('universe');
refreshCount();
runIntro();
requestAnimationFrame(frame);
</script>
