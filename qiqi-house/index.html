<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>七七小院 · 新中式两层宅改造方案</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#f6ead9}
  .frame{position:absolute;inset:0;width:100%;height:100%;border:0;opacity:0;pointer-events:none;transition:opacity .45s ease}
  .frame.on{opacity:1;pointer-events:auto}
  #langsw{position:fixed;top:12px;right:12px;z-index:999}
  #langbtn{display:inline-block;padding:8px 15px;border:0;border-radius:999px;background:#a63b26;color:#f6ead9;
    font:600 13px/1 Georgia,"Songti SC",serif;letter-spacing:.1em;cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.28);opacity:.92;transition:opacity .2s}
  #langbtn:hover{opacity:1}
  #langbtn:disabled{cursor:progress;opacity:.6}
</style>
</head>
<body>
<div id="langsw"><button id="langbtn" type="button">EN</button></div>
<noscript><meta http-equiv="refresh" content="0;url=cn.html"></noscript>
<script>
(function(){
  var TITLES = {zh:'七七小院 · 新中式两层宅改造方案', en:'Qiqi Courtyard House · New Chinese Style Two-Storey Renovation'};
  var SRC = {zh:'cn.html', en:'en.html'};
  var frames = {};           // lang -> {el, ready, waiters:[]}
  var btn = document.getElementById('langbtn');
  var cur = 'zh';
  try{ if(localStorage.getItem('qiqi-lang')==='en') cur='en'; }catch(_){}

  function ensure(lang, cb){
    var f = frames[lang];
    if(f){ if(f.ready) cb&&cb(); else if(cb) f.waiters.push(cb); return; }
    var el = document.createElement('iframe');
    el.className = 'frame';
    el.title = TITLES[lang];
    f = frames[lang] = {el:el, ready:false, waiters:cb?[cb]:[]};
    el.addEventListener('load', function(){
      f.ready = true;
      while(f.waiters.length) f.waiters.shift()();
    });
    el.src = SRC[lang];
    document.body.insertBefore(el, document.getElementById('langsw'));
  }

  function show(lang){
    for(var k in frames) frames[k].el.classList.toggle('on', k===lang);
    cur = lang;
    btn.textContent = lang==='zh' ? 'EN' : '中文';
    document.title = TITLES[lang];
    document.documentElement.lang = lang==='zh' ? 'zh' : 'en';
    try{ localStorage.setItem('qiqi-lang', lang); }catch(_){}
  }

  btn.addEventListener('click', function(){
    var next = cur==='zh' ? 'en' : 'zh';
    btn.disabled = true;
    ensure(next, function(){ show(next); btn.disabled = false; });
  });

  ensure(cur, function(){ show(cur); });
  // warm the other language in the background so the first switch is instant
  setTimeout(function(){ ensure(cur==='zh' ? 'en' : 'zh'); }, 4000);
})();
</script>
</body>
</html>
